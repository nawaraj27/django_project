{% extends "base.html" %}
{% block title %}Set New Password{% endblock title %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h2>Set a New Password</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn-login">Change Password</button>
    </form>
  </div>
</div>
{% endblock content %}
