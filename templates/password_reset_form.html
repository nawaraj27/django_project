{% extends "base.html" %}
{% block title %}Password Reset{% endblock title %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h2>Password Reset</h2>
    {% if messages %}
      <ul class="messages">
      {% for message in messages %}
        <li class="{{ message.tags }}">{{ message }}</li>
      {% endfor %}
      </ul>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_email">Email Address</label>
        <input type="email" name="email" id="id_email" class="form-control" placeholder="Enter your email for reset" required />
      </div>
      <button type="submit" class="btn-login">Send Password Reset Email</button>
    </form>
    <div class="auth-links" style="margin-top:15px;">
      <a href="/auth/login/">Back to Login</a>
    </div>
  </div>
</div>
{% endblock content %}
