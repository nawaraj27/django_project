{% extends "base.html" %} 
{% block title %}Login{% endblock title %}

{% block content %}
<style>
  .auth-container {
    min-height: 100vh;
    background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  
  .auth-card {
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    padding: 40px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }
  
  .auth-card h2 {
    color: #1976d2;
    margin-bottom: 30px;
    font-weight: 600;
  }
  
  .form-group {
    margin-bottom: 20px;
    text-align: left;
  }
  
  .form-group label {
    display: block;
    margin-bottom: 8px;
    color: #333;
    font-weight: 500;
  }
  
  .form-control {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 16px;
    transition: border-color 0.3s ease;
  }
  
  .form-control:focus {
    outline: none;
    border-color: #1976d2;
    box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1);
  }
  
  .btn-login {
    width: 100%;
    background: #1976d2;
    color: white;
    border: none;
    padding: 14px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.3s ease;
    margin-top: 10px;
  }
  
  .btn-login:hover {
    background: #1565c0;
  }
  
  .auth-links {
    margin-top: 20px;
    color: #666;
  }
  
  .auth-links a {
    color: #1976d2;
    text-decoration: none;
    font-weight: 500;
  }
  
  .auth-links a:hover {
    text-decoration: underline;
  }
  
  .messages {
    list-style: none;
    padding: 0;
    margin-bottom: 20px;
  }
  
  .messages li {
    padding: 10px 15px;
    border-radius: 6px;
    margin-bottom: 10px;
    font-size: 14px;
  }
  
  .messages .success {
    background: #e8f5e8;
    color: #2e7d32;
    border: 1px solid #c8e6c9;
  }
  
  .messages .error {
    background: #ffebee;
    color: #c62828;
    border: 1px solid #ffcdd2;
  }
  
  .messages .warning {
    background: #fff3e0;
    color: #ef6c00;
    border: 1px solid #ffcc02;
  }
  
  .messages .info {
    background: #e3f2fd;
    color: #1976d2;
    border: 1px solid #bbdefb;
  }
</style>

<div class="auth-container">
  <div class="auth-card">
    <h2>Welcome Back</h2>
    
    {% if messages %}
    <ul class="messages">
      {% for message in messages %}
        <li class="{{ message.tags }}">{{ message }}</li>
      {% endfor %}
    </ul>
    {% endif %}
    
    <form action="/auth/login/" method="post">
      {% csrf_token %}
      
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          class="form-control"
          id="email"
          name="email"
          placeholder="Enter your email"
          required
        />
      </div>
      
      <div class="form-group">
        <label for="pass1">Password</label>
        <input
          type="password"
          class="form-control"
          id="pass1"
          name="pass1"
          placeholder="Enter your password"
          required
        />
      </div>
      <div class="form-group" style="display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;">
          <input type="checkbox" id="remember" name="remember" style="margin:0 8px 0 0;">
          <label for="remember" style="margin-bottom:0;color:#444;font-size:15px;">Remember Me</label>
        </div>
      </div>
      
      <button type="submit" class="btn-login">Sign In</button>
    </form>
    <div class="auth-links" style="margin-top:15px;">
      <a href="/auth/password_reset/" style="font-size:15px;">Forgot Password?</a>
    </div>
    
    <div class="auth-links">
      <p>Don't have an account? <a href="/auth/signup/">Sign Up</a></p>
    </div>
  </div>
</div>
{% endblock content %}
